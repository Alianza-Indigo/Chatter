# Whalabi — reverse proxy sugerido (Nginx).
#
# Enruta:
#   /_matrix, /_synapse  -> Synapse (Client-Server API y federación)
#   /.well-known/matrix  -> descubrimiento Matrix
#   /api                 -> API auxiliar de Whalabi
#   /                    -> frontend Next.js (PWA)
#
# En producción, terminar TLS aquí (certbot / cert-manager) y enrutar por
# dominio de tenant. Cada tenant puede apuntar su dominio a este proxy.

upstream whalabi_synapse { server synapse:8008; }
upstream whalabi_api     { server api:4000; }
upstream whalabi_web     { server web:3000; }

server {
  listen 80;
  server_name _;

  client_max_body_size 50M;

  # --- Descubrimiento Matrix (well-known) ---
  location /.well-known/matrix/server {
    default_type application/json;
    return 200 '{"m.server": "$host:443"}';
  }
  location /.well-known/matrix/client {
    default_type application/json;
    add_header Access-Control-Allow-Origin *;
    return 200 '{"m.homeserver": {"base_url": "https://$host"}}';
  }

  # --- Matrix Client-Server API y federación ---
  location ~ ^(/_matrix|/_synapse/client) {
    proxy_pass http://whalabi_synapse;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 600s;
  }

  # --- API auxiliar de Whalabi ---
  location /api/ {
    proxy_pass http://whalabi_api;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # --- Frontend (PWA) ---
  location / {
    proxy_pass http://whalabi_web;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
