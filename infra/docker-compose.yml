# Whalabi — Docker Compose para desarrollo / despliegue base.
#
# Servicios:
#   postgres-synapse  Base de datos de Synapse (fuente de verdad de mensajería)
#   postgres-app      Base de datos de Whalabi (tenants, logs del bot)
#   synapse           Homeserver Matrix
#   api               API auxiliar de Whalabi (Fastify)
#   bot               Bot inteligente (matrix-bot-sdk)
#   web               Frontend Next.js (PWA)
#   nginx             Reverse proxy opcional (perfil "proxy")
#
# Uso típico en desarrollo (solo infraestructura, apps con pnpm dev):
#   docker compose up -d postgres-synapse postgres-app synapse
#
# Despliegue completo:
#   docker compose --profile full up -d --build

name: whalabi

services:
  postgres-synapse:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: synapse
      POSTGRES_DB: synapse
      # Synapse requiere esta configuración de collation.
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - pg-synapse:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-app:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: whalabi
      POSTGRES_PASSWORD: whalabi
      POSTGRES_DB: whalabi
    volumes:
      - pg-app:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whalabi"]
      interval: 10s
      timeout: 5s
      retries: 5

  synapse:
    # Versión fijada para reproducibilidad (no usar :latest en producción).
    # Actualiza conscientemente revisando el changelog de Synapse.
    image: matrixdotorg/synapse:v1.119.0
    restart: unless-stopped
    depends_on:
      postgres-synapse:
        condition: service_healthy
    environment:
      SYNAPSE_SERVER_NAME: ${MATRIX_DEFAULT_SERVER_NAME:-whalabi.local}
      SYNAPSE_REPORT_STATS: "no"
    volumes:
      - ./synapse:/data
    ports:
      - "8008:8008"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8008/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  api:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres-app:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: postgresql://whalabi:whalabi@postgres-app:5432/whalabi?schema=public
      MATRIX_DEFAULT_HOMESERVER_URL: http://synapse:8008
      MATRIX_DEFAULT_SERVER_NAME: ${MATRIX_DEFAULT_SERVER_NAME:-whalabi.local}
      MATRIX_ADMIN_USER: ${MATRIX_ADMIN_USER:-}
      MATRIX_ADMIN_PASSWORD: ${MATRIX_ADMIN_PASSWORD:-}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:3000}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-change-me-admin-api-token}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-change-me-please-a-long-random-secret}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-}
      CORS_ORIGIN: ${APP_PUBLIC_URL:-http://localhost:3000}
      LLM_PROVIDER: ${LLM_PROVIDER:-dummy}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@whalabi.app}
    ports:
      - "4000:4000"

  bot:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: apps/bot/Dockerfile
    restart: unless-stopped
    depends_on:
      - synapse
      - postgres-app
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://whalabi:whalabi@postgres-app:5432/whalabi?schema=public
      BOT_ENABLED: ${BOT_ENABLED:-true}
      BOT_HOMESERVER_URL: http://synapse:8008
      BOT_USER_ID: ${BOT_USER_ID:-@whalabi-bot:whalabi.local}
      BOT_PASSWORD: ${BOT_PASSWORD:-}
      BOT_ACCESS_TOKEN: ${BOT_ACCESS_TOKEN:-}
      BOT_DISPLAY_NAME: ${BOT_DISPLAY_NAME:-Whalabi Bot}
      BOT_STORE_CONTENT: ${BOT_STORE_CONTENT:-false}
      BOT_DEFAULT_TENANT_SLUG: ${BOT_DEFAULT_TENANT_SLUG:-default}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-dummy}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
    volumes:
      - bot-storage:/app/.bot-storage

  web:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_MATRIX_HOMESERVER_URL: ${NEXT_PUBLIC_MATRIX_HOMESERVER_URL:-http://localhost:8008}
        NEXT_PUBLIC_MATRIX_SERVER_NAME: ${MATRIX_DEFAULT_SERVER_NAME:-whalabi.local}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"

  nginx:
    profiles: ["proxy"]
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - synapse
    volumes:
      - ./nginx/whalabi.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

  # Alternativa recomendada para internet público: HTTPS automático (Let's Encrypt).
  # Requiere WHALABI_DOMAIN apuntando a la IP pública y puertos 80/443 abiertos.
  caddy:
    profiles: ["caddy"]
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
      - synapse
    environment:
      WHALABI_DOMAIN: ${WHALABI_DOMAIN:-localhost}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - "80:80"
      - "443:443"

volumes:
  pg-synapse:
  pg-app:
  bot-storage:
  caddy-data:
  caddy-config:
